name: CI Pipeline

on:
push:
branches: [main]

jobs:

lint:
name: Lint and Format Check
runs-on: ubuntu-latest
steps:
- uses: actions/checkout@v4

```
  - uses: actions/setup-python@v5
    with:
      python-version: "3.10"

  - run: pip install flake8
  - run: flake8 .
```

test:
name: Unit Tests
runs-on: ubuntu-latest
needs: lint
steps:
- uses: actions/checkout@v4

```
  - uses: actions/setup-python@v5
    with:
      python-version: "3.10"

  - run: pip install -r requirements.txt
  - run: pytest
```

ml-pipeline:
name: ML Pipeline
runs-on: ubuntu-latest
needs: test
steps:
- uses: actions/checkout@v4

```
  - uses: actions/setup-python@v5
    with:
      python-version: "3.10"

  - name: Install dependencies
    run: pip install -r requirements.txt

  # ❌ REMOVED dataset validation (important)

  - name: Run full ML pipeline
    run: python run_pipeline.py
```

docker:
name: Docker Build and Test
runs-on: ubuntu-latest
needs: ml-pipeline
steps:
- uses: actions/checkout@v4

```
  - name: Build Docker image (NO CACHE)
    run: docker build --no-cache -t burnout-prediction -f docker/Dockerfile.ci .

  - name: Run pipeline inside container
    run: docker run --rm burnout-prediction
```
