name: CI Pipeline

on:
push:
branches:
- main

jobs:

lint:
runs-on: ubuntu-latest
steps:
- uses: actions/checkout@v4

```
  - uses: actions/setup-python@v5
    with:
      python-version: "3.10"

  - name: Install flake8
    run: pip install flake8

  - name: Run lint
    run: flake8 .
```

test:
runs-on: ubuntu-latest
needs: lint
steps:
- uses: actions/checkout@v4

```
  - uses: actions/setup-python@v5
    with:
      python-version: "3.10"

  - name: Install dependencies
    run: pip install -r requirements.txt

  - name: Run tests
    run: pytest
```

ml-pipeline:
runs-on: ubuntu-latest
needs: test
steps:
- uses: actions/checkout@v4

```
  - uses: actions/setup-python@v5
    with:
      python-version: "3.10"

  - name: Install dependencies
    run: pip install -r requirements.txt

  - name: Run ML pipeline
    run: python run_pipeline.py
```

docker:
runs-on: ubuntu-latest
needs: ml-pipeline
steps:
- uses: actions/checkout@v4

```
  - name: Build Docker image
    run: docker build --no-cache -t burnout-prediction -f docker/Dockerfile.ci .

  - name: Run container
    run: docker run --rm burnout-prediction
```
